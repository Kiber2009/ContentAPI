on:
  push:
    branches: [ main ]
    paths: [ "README.md" ]
permissions:
  contents: read
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version-file: .java-version
          distribution: temurin
      - run: chmod +x ./gradlew && ./gradlew syncPluginPublicationMainResourcePagePageToHangar modrinthSyncBody