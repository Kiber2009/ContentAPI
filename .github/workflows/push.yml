on:
  - push
  - pull_request
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version
      - name: Build
        run: chmod +x ./gradlew && ./gradlew build
      - uses: actions/upload-artifact@v7
        with:
          path: build/libs/*.jar
          archive: false